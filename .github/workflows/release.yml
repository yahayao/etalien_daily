name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Build with PyInstaller
        run: uv run python build.py

      - name: Prepare release directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release/etalien-daily-windows-x64/config
          Copy-Item dist/etalien-daily.exe release/etalien-daily-windows-x64/etalien-daily.exe

      - name: Archive release
        shell: pwsh
        run: |
          Compress-Archive -Path release/etalien-daily-windows-x64 -DestinationPath etalien-daily-windows-x64.zip -Force

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: etalien-daily-windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
